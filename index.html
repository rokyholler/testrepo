<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; font-family: sans-serif; }

    /* Header styling */
    .header {
      height: 50px;
      background-color: #470D4A;
      color: white;
      display: flex;
      align-items: center;    /* Centers text vertically */
      justify-content: center; /* Centers text horizontally */
    }

    /* Main content centering */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;    /* Centers form horizontally */
      justify-content: center; /* Centers form vertically on the page */
      height: calc(100vh - 50px); /* Uses remaining screen height */
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 300px;
    }
  </style>
</head>
<body>
  <header class="header">
    My Website Header
  </header>
  <div class="main-content" id="content-wrapper">
    <!-- This ID is used to target and replace the content -->
    <form id="dataForm">
      <input type="text" name="data" placeholder="Type something..." required>
      <button type="submit" id="submitBtn">Submit</button>
    </form>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxXVhKNsTrcAWP1mF10PWv6l6V7U9WezCV48PuW42wNVql4Hy4uEA9x_kx7asMTd_K-8Q/exec'; // Replace with your Google Apps Script URL
    const form = document.getElementById('dataForm');
    const wrapper = document.getElementById('content-wrapper');

    form.addEventListener('submit', e => {
      e.preventDefault(); // Prevents the page from refreshing
      
      // Optional: Change button text to show it's working
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('submitBtn').innerText = "Sending...";

      fetch(scriptURL, { 
        method: 'POST', 
        body: new FormData(form) 
      })
      .then(response => {
        // REPLACE the entire wrapper content with your success message
        wrapper.innerHTML = "<h2>✅ Registered!</h2>";
      })
      .catch(error => {
        console.error('Error!', error.message);
        alert("Something went wrong. Please try again.");
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerText = "Submit";
      });
    });
  </script>

</body>
</html>
